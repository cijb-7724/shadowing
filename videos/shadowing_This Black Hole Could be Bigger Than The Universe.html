        // タイムスタンプの秒数に変換 (HH:MM:SS形式にも対応)
        function getSeconds(timeStr) {
            const parts = timeStr.replace(/[\[\]]/g, '').split(':').map(Number);
            let seconds = 0;
            if (parts.length === 3) { // HH:MM:SS
                seconds = parts[0] * 3600 + parts[1] * 60 + parts[2];
            } else if (parts.length === 2) { // MM:SS
                seconds = parts[0] * 60 + parts[1];
            }
            return seconds;
        }

            { time: '[06:21]', en: 'Like a rubber ball that you\'ve squeezed too much and that suddenly rebounds, space might expand again.', jp: 'まるで、押しつぶしすぎたゴムボールが突然跳ね返るように、空間が再び膨張するかもしれません。', vocab: 'squeezed too much (押しつぶしすぎる), rebounds (跳ね返る), expand again (再び膨張する)' },
            { time: '[06:28]', en: 'So a new universe could be born inside a black hole.', jp: 'つまり、ブラックホールの内部で新しい宇宙が生まれる可能性があるのです。', vocab: '' },
            { time: '[06:31]', en: 'The funny thing about this scenario is that nothing has changed in the slightest outside the black hole.', jp: 'このシナリオの面白い点は、ブラックホールの外側では何一つ変わっていないことです。', vocab: 'funny thing (面白い点), in the slightest (少しも)' },
            { time: '[06:36]', en: 'Watching from the outside, it\'s still a black sphere of nothingness.', jp: '外から見ていると、それは相変わらず何もない黒い球体です。', vocab: 'nothingness (無)' },
            { time: '[06:40]', en: 'And yet, on the inside, a new universe has been born.', jp: 'それなのに、内側では新しい宇宙が生まれているのです。', vocab: 'and yet (それにもかかわらず)' },
            { time: '[06:44]', en: 'So maybe our universe was born like this, and we are all actually inside a black hole.', jp: 'ひょっとすると、私たちの宇宙もこのようにして生まれたのかもしれず、私たちは皆、実際にはブラックホールの内部にいるのかもしれません。', vocab: '' },
            { time: '[06:50]', en: 'But if our universe can also create black holes, they might give birth to new universes.', jp: 'しかし、私たちの宇宙もブラックホールを作ることができるなら、それらのブラックホールが新しい宇宙を生み出すかもしれません。', vocab: 'give birth to (～を生み出す)' },
            { time: '[06:56]', en: 'Is our black hole Universe also just part of a universe further up that\'s also black hole inside another universe?', jp: '私たちのブラックホール宇宙も、さらに上にある別の宇宙の一部であり、その別の宇宙の中のブラックホールなのでしょうか？', vocab: 'further up (さらに上に)' },

            { time: '[07:07]', en: 'Is the cosmos black holes inside black holes inside black holes: infinite black hole universes?', jp: '宇宙は、ブラックホールの内側のブラックホールの内側のブラックホールの内側にある、無限のブラックホール宇宙なのでしょうか？', vocab: 'cosmos (宇宙)' },
            { time: '[07:16]', en: 'If the universe creates black holes that create universes that then create new black holes that create new universes, this Cosmic self-reproduction would be subject to Natural Selection.', jp: 'もし宇宙が、宇宙を生み出すブラックホールを作り、その宇宙がさらに新しいブラックホールを作り、それが新しい宇宙を生み出すなら、この宇宙的な自己生殖は自然淘汰の対象となるでしょう。', vocab: 'self-reproduction (自己生殖), subject to (～の対象となる), Natural Selection (自然淘汰)' },
            { time: '[07:27]', en: 'A big bang is a chaotic and messy event, so it\'s possible that the new daughter universes would not always be fully identical to their moms.', jp: 'ビッグバンは混沌としていて乱雑な出来事なので、新しい娘宇宙が常に母親宇宙と完全に同一ではない可能性があります。', vocab: 'chaotic (混沌とした), messy event (乱雑な出来事), daughter universes (娘宇宙), fully identical to (～と完全に同一の)' },
            { time: '[07:35]', en: 'Sometimes physics may be slightly different, with some fundamental values higher or lower.', jp: '時として、物理法則がわずかに異なり、いくつかの基本的な値が高くなったり低くなったりするかもしれません。', vocab: 'slightly different (わずかに異なる), fundamental values (基本的な値)' },
            { time: '[07:40]', en: 'And so some universes might be able to create loads of stars, planets, and black holes; others might not.', jp: 'そのため、一部の宇宙は多くの星、惑星、ブラックホールを作ることができるかもしれませんが、他の宇宙はそうでないかもしれません。', vocab: 'loads of (多くの)' },
            { time: '[07:47]', en: 'Maybe creating a uniform Cosmic soup where no stars, planets, and black holes form.', jp: '星、惑星、ブラックホールが形成されない均一な宇宙のスープを作るかもしれません。', vocab: 'uniform (均一な), Cosmic soup (宇宙のスープ)' },
            { time: '[07:53]', en: 'But if all universes are born inside black holes, in the long run all universe lines that don\'t create loads of black holes would die out.', jp: 'しかし、もし全ての宇宙がブラックホールの内部で生まれるなら、長期的には多くのブラックホールを作らない全ての宇宙の系統は消滅するでしょう。', vocab: 'in the long run (長期的には), die out (消滅する)' },

            { time: '[08:07]', en: 'Survival of the fittest, but with universes instead of organisms.', jp: '適者生存、ただし生物ではなく宇宙での話です。', vocab: 'survival of the fittest (適者生存), organisms (生物)' },
