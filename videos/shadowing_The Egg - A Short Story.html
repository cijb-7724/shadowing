    <script>
        // YouTube APIの読み込み
        let player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', {
                events: {
                    'onReady': onPlayerReady
                }
            });
        }
        
        function onPlayerReady(event) {
            console.log("YouTube Player is Ready!");
        }

        // タイムスタンプの秒数に変換 (HH:MM:SS形式にも対応)
        function getSeconds(timeStr) {
            const parts = timeStr.replace(/[\[\]]/g, '').split(':').map(Number);
            let seconds = 0;
            if (parts.length === 3) { // HH:MM:SS
                seconds = parts[0] * 3600 + parts[1] * 60 + parts[2];
            } else if (parts.length === 2) { // MM:SS
                seconds = parts[0] * 60 + parts[1];
            }
            return seconds;
        }

        // 埋め込みプレーヤーの再生操作
        window.playAtTime = function(timeStr) {
            if (player && player.seekTo) {
                const seconds = getSeconds(timeStr);
                player.seekTo(seconds, true);
                player.playVideo();
            } else {
                alert("YouTubeプレーヤーが読み込まれていません。少し待ってからお試しください。");
            }
        };

        // 日本語訳の表示/非表示を切り替える関数
        window.toggleTranslation = function(element) {
            const translation = element.querySelector('.translation-content');
            translation.classList.toggle('hidden');
            
            // タップ時のテキストを切り替え
            const currentText = element.querySelector('.translation');
            if (translation.classList.contains('hidden')) {
                currentText.textContent = '日本語訳を見るにはタップしてください';
            } else {
                currentText.textContent = '日本語訳を隠すにはタップしてください';
            }
        };
        
        // 動画データ (タイムスタンプ：ミリ秒切り捨て & 1秒バッファ適用済み)
        const data = [
            // ----------------------------------------------------
            // ここから動画データ

            { time: '[00:13]', en: 'It was a painless death.', jp: 'それは痛みのない死でした。', vocab: 'painless (痛みのない)' },
            { time: '[00:14]', en: 'The Medics tried their best to save you, but to no avail.', jp: '救急隊員はあなたを救おうと最善を尽くしましたが、無駄でした。', vocab: 'Medics (救急隊員), to no avail (無駄に、効果なく)' },
            { time: '[00:18]', en: 'Your body was so utterly shattered, you were better off, trust me.', jp: 'あなたの体は完全に粉砕されており、その方がマシでした、信じてください。', vocab: 'utterly (完全に), shattered (粉砕された), better off (～のほうがマシな)' },
            { time: '[00:25]', en: 'And that\'s when you met me.', jp: 'そして、その時、あなたは私に会いました。', vocab: '' },

            { time: '[00:48]', en: 'You looked around.', jp: 'あなたは周りを見渡しました。', vocab: '' },

            { time: '[01:07]', en: 'My kids, my wife, what about them?', jp: '私の子供たち、妻は？彼女たちはどうなるのですか？', vocab: '' },
            { time: '[01:10]', en: 'Will they be all right?', jp: '大丈夫でしょうか？', vocab: 'be all right (大丈夫である)' },

            { time: '[02:07]', en: 'Oh, so what happens now?', jp: 'ああ、ではこれからどうなるのですか？', vocab: '' },

            { time: '[02:34]', en: 'Where are we going?', jp: '私たちはどこへ行くのですか？', vocab: '' },

            { time: '[02:49]', en: 'A baby.', jp: '赤ちゃんに。', vocab: '' },
            { time: '[02:50]', en: 'So all my experiences and everything I did in this life won\'t matter.', jp: 'だから、私の経験も、この人生でやったことも、すべて無意味になる。', vocab: '' },

            { time: '[03:09]', en: 'Your soul is more magnificent, beautiful, and gigantic than you can possibly imagine.', jp: 'あなたの魂は、あなたが想像できる以上に壮大で、美しく、巨大です。', vocab: 'soul (魂), magnificent (壮大な), gigantic (巨大な), possibly (可能性として)' },

            { time: '[03:22]', en: 'It\'s like sticking your finger in a glass of water to see if it\'s hot or cold.', jp: 'それは、水が熱いか冷たいかを見るために、グラスに指を突っ込むようなものです。', vocab: 'sticking (突っ込む)' },

            { time: '[04:02]', en: 'This time around, you\'ll be a Chinese peasant girl in 540 AD.', jp: '今回は、西暦540年の中国の農民の少女になります。', vocab: 'time around (今回は), peasant (農民), AD (西暦)' },
